[phases.setup]
nixPkgs = [
    "php83",
    "php83Extensions.pdo",
    "php83Extensions.pdo_mysql",
    "php83Extensions.mbstring",
    "php83Extensions.fileinfo",
    "php83Extensions.openssl",
    "php83Extensions.curl",
    "php83Extensions.gd",
    "php83Extensions.soap",
    "php83Extensions.dom",
    "php83Extensions.xml",
    "php83Extensions.simplexml",
    "php83Extensions.zip",
    "php83Extensions.xmlreader",
    "php83Extensions.xmlwriter",
    "php83Extensions.iconv",
    "php83Extensions.zlib",
    "php83Packages.composer"
]

[phases.build]
cmds = [
    "mkdir -p /app/public/uploads/logos",
    "mkdir -p /app/storage/logs",
    "mkdir -p /app/storage/certificados",
    "mkdir -p /app/storage/xml/autorizadas",
    "mkdir -p /app/storage/xml/canceladas",
    "mkdir -p /app/storage/xml/inutilizadas"
]

[start]
cmd = "php -S 0.0.0.0:${PORT:-8081} -t /app/public"
