[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.fileinfo", "php83Extensions.openssl", "php83Extensions.curl", "php83Extensions.gd"]

[phases.build]
cmds = ["mkdir -p /app/public/uploads/logos", "mkdir -p /app/storage/logs"]

[start]
cmd = "php -S 0.0.0.0:${PORT:-8080} -t /app/public"
